colors: false

# output:
#   - meta # Print lefthook version
#   - summary # Print summary block (successful and failed steps)
#   - empty_summary # Print summary heading when there are no steps to run
#   - success # Print successful steps
#   - failure # Print failed steps printing
#   - execution # Print any execution logs
#   - execution_out # Print execution output
#   - execution_info # Print `EXECUTE > ...` logging
#   - skips # Print "skip" (i.e. no files matched)

pre-commit:
  parallel: true
  commands:
    lint-md:
      stage_fixed: true
      skip:
        - merge
        - rebase
      env:
        CI: 'true'
      # root: ''
      run: uv run mdformat {staged_files}
      glob: '*.md'
      exclude:
        - .github/**
        - .vscode/**
    lint-py:
      stage_fixed: false
      run: uv run ruff check {staged_files}
      glob: '*.{py}'
    style-py:
      stage_fixed: true
      run: uv run ruff format {staged_files}
      glob: '*.{py}'
    style-json:
      stage_fixed: true
      run: python -m json.tool {staged_files} {staged_files}
      glob: '{!(package)*.json,*.code-snippets,.!(browserslist)*rc}'
      # glob: '*.{json}'

# prepare-commit-msg:
#   commands:
#     pre-commitlint:
#       run: uv run pre-commit install --hook-type pre-commit --hook-type commit-msg
#       # run: commit-check --no-banner --hook prepare-commit-msg --format json $1

commit-msg:
  commands:
    commit-lint:
      run: uv run gitlint
      # run: uv run gitlint --silent
      # run: uv run commit-check --no-banner --message
      # run: commit-check --no-banner --message --format json $1

pre-push:
  commands:
    ci:
      run: make ci

post-merge:
  commands:
    install:
      run: uv sync
    lefthook-install:
      run: lefthook install --force
